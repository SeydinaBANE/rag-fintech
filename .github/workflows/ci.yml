name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=rag --cov-report=term-missing --cov-fail-under=70

  security:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Audit dependencies (pip-audit)
        run: uv run pip-audit

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    name: Integration tests (real Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fintech
          POSTGRES_USER: fintech_admin
          POSTGRES_PASSWORD: ci_admin_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fintech_admin -d fintech"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: fintech
      DB_USER: fintech_admin
      DB_PASSWORD: ci_admin_pw
      READONLY_DB_PASSWORD: ci_readonly_pw
      RUN_INTEGRATION_TESTS: "1"
      OPENROUTER_API_KEY: "test"
      OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Initialize database (schema, migrations, app_readonly role)
        run: uv run python scripts/init_db.py

      - name: Run integration tests
        run: uv run pytest tests/test_integration.py -v --tb=short
