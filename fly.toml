app = "rag-fintech"
primary_region = "cdg"

[deploy]
  release_command = "python scripts/init_db.py"

[http_service]
  internal_port = 8502
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/_stcore/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
